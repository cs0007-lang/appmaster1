name: Build AppMaster IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AppMaster
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install Certificate
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "${{ secrets.CERTIFICATE_P12_BASE64 }}" | base64 --decode > $CERT_PATH

          pip3 install pyOpenSSL --quiet

          python3 << 'EOF'
import os
from OpenSSL import crypto

with open(os.environ['RUNNER_TEMP'] + '/certificate.p12', 'rb') as f:
    p12_data = f.read()

p12 = crypto.load_pkcs12(p12_data, b'Apple123')

cert_pem = crypto.dump_certificate(crypto.FILETYPE_PEM, p12.get_certificate())
key_pem = crypto.dump_privatekey(crypto.FILETYPE_PEM, p12.get_privatekey())

with open(os.environ['RUNNER_TEMP'] + '/cert.pem', 'wb') as f:
    f.write(cert_pem)
with open(os.environ['RUNNER_TEMP'] + '/key.pem', 'wb') as f:
    f.write(key_pem)

print("Certificate extracted successfully")
EOF

          security create-keychain -p "keychain123" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "keychain123" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/cert.pem -A -k $KEYCHAIN_PATH
          security import $RUNNER_TEMP/key.pem -A -k $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "Profile UUID: $UUID"
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Archive
        run: |
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AppMaster.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="Y2J8QP7QPH"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AppMaster.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppMaster-IPA
          path: ${{ runner.temp }}/IPA/*.ipa
          retention-days: 30
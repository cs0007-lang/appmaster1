name: Build AppMaster IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method (must match your provisioning profile type)"
        required: false
        default: ad-hoc
        type: choice
        options:
          - ad-hoc
          - development
          - app-store

jobs:
  build:
    name: Build AppMaster
    runs-on: macos-latest
    env:
      EXPORT_METHOD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.export_method || 'ad-hoc' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify signing secrets
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CERTIFICATE_P12_BASE64:-}" ]; then echo "::error::Missing secret CERTIFICATE_P12_BASE64"; missing=1; fi
          if [ -z "${CERTIFICATE_PASSWORD:-}" ]; then echo "::error::Missing secret CERTIFICATE_PASSWORD"; missing=1; fi
          if [ -z "${PROVISIONING_PROFILE_BASE64:-}" ]; then echo "::error::Missing secret PROVISIONING_PROFILE_BASE64"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo "Add these in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Write certificate and profile
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          python3 - << 'PY'
          import os, base64, pathlib
          root = pathlib.Path(os.environ["RUNNER_TEMP"])
          root.joinpath("signing.p12").write_bytes(
              base64.b64decode(os.environ["CERTIFICATE_P12_BASE64"]))
          root.joinpath("profile.mobileprovision").write_bytes(
              base64.b64decode(os.environ["PROVISIONING_PROFILE_BASE64"]))
          PY

      - name: Create keychain and import .p12
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="gha-signing-temp"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing.p12" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile and read metadata
        id: profile
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          python3 << 'PY'
          import os, plistlib
          out = os.environ["GITHUB_OUTPUT"]
          path = os.path.join(os.environ["RUNNER_TEMP"], "profile.plist")
          with open(path, "rb") as f:
              data = plistlib.load(f)
          ent = data.get("Entitlements") or {}
          app_id = ent.get("application-identifier") or ""
          if "." not in app_id:
              raise SystemExit("Could not read application-identifier from provisioning profile")
          team_id, _profile_bundle = app_id.split(".", 1)
          prof_name = data.get("Name") or ""
          with open(out, "a", encoding="utf-8") as gh:
              gh.write(f"team_id={team_id}\n")
              gh.write("profile_name<<EOF\n")
              gh.write(prof_name + "\n")
              gh.write("EOF\n")
          PY

      - name: Read app bundle identifier from Xcode
        id: appmeta
        run: |
          set -euo pipefail
          BUNDLE_ID="$(xcodebuild -project AppMaster.xcodeproj -scheme AppMaster -configuration Release -showBuildSettings 2>/dev/null | awk -F' = ' '/PRODUCT_BUNDLE_IDENTIFIER/ {gsub(/^ +| +$/,"",$2); print $2; exit}')"
          if [ -z "$BUNDLE_ID" ]; then
            echo "::error::Could not read PRODUCT_BUNDLE_IDENTIFIER from Xcode project."
            exit 1
          fi
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve code signing identity
        id: signing
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          IDS=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          echo "$IDS"
          IDENTITY=$(printf '%s\n' "$IDS" | sed -n 's/.*"\(Apple Distribution:.*\)"/\1/p' | head -n1)
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(printf '%s\n' "$IDS" | sed -n 's/.*"\(Apple Development:.*\)"/\1/p' | head -n1)
          fi
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Apple Development / Apple Distribution identity found in keychain."
            exit 1
          fi
          {
            echo "identity<<EOF"
            echo "$IDENTITY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Archive
        env:
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
          BUILD_TEAM_ID: ${{ steps.profile.outputs.team_id }}
          SIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AppMaster.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$BUILD_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY"

      - name: Export IPA
        env:
          BUILD_TEAM_ID: ${{ steps.profile.outputs.team_id }}
          BUNDLE_ID: ${{ steps.appmeta.outputs.bundle_id }}
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
        run: |
          set -euo pipefail
          python3 << PY
          import os, plistlib
          opts = {
              "method": os.environ["EXPORT_METHOD"],
              "signingStyle": "manual",
              "teamID": os.environ["BUILD_TEAM_ID"],
              "provisioningProfiles": {
                  os.environ["BUNDLE_ID"]: os.environ["PROFILE_NAME"],
              },
              "compileBitcode": False,
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "ExportOptions.plist")
          with open(path, "wb") as f:
              plistlib.dump(opts, f)
          PY
          plutil -lint "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AppMaster.xcarchive" \
            -exportPath "$RUNNER_TEMP/IPA" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppMaster-IPA
          path: ${{ runner.temp }}/IPA/*.ipa
          retention-days: 30

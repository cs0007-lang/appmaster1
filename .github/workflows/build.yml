name: Build AppMaster IPA
 
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method (must match your provisioning profile type)"
        required: false
        default: ad-hoc
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
 
jobs:
  build:
    name: Build AppMaster
    runs-on: macos-latest
    env:
      EXPORT_METHOD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.export_method || 'ad-hoc' }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
 
      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AppMaster.xcarchive" \
            CODE_SIGNING_ALLOWED=NO
 
      - name: Export IPA
        run: |
          set -euo pipefail
          python3 << PY
          import os, plistlib
          opts = {
              "method": os.environ["EXPORT_METHOD"],
              "signingStyle": "automatic",
              "compileBitcode": False,
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "ExportOptions.plist")
          with open(path, "wb") as f:
              plistlib.dump(opts, f)
          PY
          plutil -lint "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AppMaster.xcarchive" \
            -exportPath "$RUNNER_TEMP/IPA" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
 
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppMaster-IPA
          path: ${{ runner.temp }}/IPA/*.ipa
          retention-days: 30
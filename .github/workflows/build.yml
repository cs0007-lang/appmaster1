name: Build AppMaster IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      sign_ipa:
        description: 'Sign IPA (requires secrets)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build AppMaster
    runs-on: macos-14

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──────────────────────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── 3. Show Xcode & Swift versions ──────────────────────────────────────
      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # ── 4. List project info ─────────────────────────────────────────────────
      - name: List project info
        run: |
          xcodebuild -project AppMaster.xcodeproj \
            -list

      # ── 5. Resolve dependencies (if any) ─────────────────────────────────────
      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AppMaster.xcodeproj \
            -scheme AppMaster || true

      # ── 6. Build (unsigned, for CI validation) ───────────────────────────────
      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            | xcpretty --color || xcodebuild build \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 7. Archive for IPA export (requires signing secrets) ─────────────────
      - name: Archive for IPA
        if: ${{ github.event.inputs.sign_ipa == 'true' || github.ref == 'refs/heads/main' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Import certificate
          if [ -n "$CERTIFICATE_BASE64" ]; then
            echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security import certificate.p12 -k build.keychain \
              -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list \
              -S apple-tool:,apple: -s -k "" build.keychain
          fi

          # Import provisioning profile
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
              > ~/Library/MobileDevice/Provisioning\ Profiles/AppMaster.mobileprovision
          fi

          # Archive
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AppMaster.xcarchive \
            -configuration Release \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="com.appmster.app" \
            | xcpretty --color || true

      # ── 8. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        if: ${{ github.event.inputs.sign_ipa == 'true' || github.ref == 'refs/heads/main' }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AppMaster.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/AppMaster \
            | xcpretty --color || true

      # ── 9. Upload IPA artifact ────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AppMaster-IPA
          path: |
            ${{ runner.temp }}/AppMaster/*.ipa
          retention-days: 30

      # ── 10. Upload build logs on failure ─────────────────────────────────────
      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            ~/Library/Logs/DiagnosticReports/
            /tmp/*.log
          retention-days: 7

  # ── Release job (creates GitHub Release with IPA) ───────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: AppMaster-IPA
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*.ipa
          name: AppMaster ${{ github.ref_name }}
          body: |
            ## AppMaster ${{ github.ref_name }}

            ### ما الجديد
            - راجع CHANGELOG.md لمعرفة التغييرات

            ### التثبيت
            1. حمّل ملف IPA
            2. ثبّته عبر AltStore أو Sideloadly أو AppMaster نفسه
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

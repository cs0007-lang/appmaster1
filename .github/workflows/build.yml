name: Build AppMaster IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AppMaster.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA (unsigned)
        run: |
          mkdir -p "$RUNNER_TEMP/IPA"
          
          # استخراج الـ .app من الأرشيف
          APP_PATH=$(find "$RUNNER_TEMP/AppMaster.xcarchive" -name "*.app" | head -1)
          
          # إنشاء Payload وتحويله لـ IPA
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "IPA/AppMaster.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppMaster-IPA-unsigned
          path: ${{ runner.temp }}/IPA/AppMaster.ipa
          retention-days: 30
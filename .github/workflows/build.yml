name: Build AppMaster IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AppMaster
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Archive for IPA
        run: |
          xcodebuild archive \
            -project AppMaster.xcodeproj \
            -scheme AppMaster \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/AppMaster.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/AppMaster.xcarchive/Products/Applications/AppMaster.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r AppMaster.ipa Payload
          ls -lh AppMaster.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AppMaster-IPA
          path: ${{ runner.temp }}/AppMaster.ipa
          retention-days: 30
